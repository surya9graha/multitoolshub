<!DOCTYPE html>
<html>
<head>
  <title>MultiToolsHub AI</title>
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1356057643477835"
   crossorigin="anonymous"></script>
</head>
<body>

  <h2>🔥 AI Tool</h2>

  <textarea id="prompt" placeholder="Write something..."></textarea>
  <br><br>

  <button onclick="askAI()">Generate</button>

  <p id="output"></p>

  <script>
    async function askAI() {
      const prompt = document.getElementById("prompt").value;

      const res = await fetch("/generateText", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      document.getElementById("output").innerText = data.text || data.error;
    }
  </script>

</body>
</html>
