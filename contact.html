<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Contact Us | MultiTools Hub</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header><div class="container nav"><a href="index.html" class="logo">MultiTools Hub</a></div></header>
    <main class="container seo-content">
        <h1>Contact Us</h1>
        <p>Questions, suggestions, or reporting a bug? We’re here to help.</p>
        <form style="max-width: 600px; margin-top: 2rem;">
            <div class="input-group"><label>Full Name</label><input type="text" class="form-control"></div>
            <div class="input-group"><label>Email Address</label><input type="email" class="form-control"></div>
            <div class="input-group"><label>Subject</label><input type="text" class="form-control"></div>
            <div class="input-group"><label>Message</label><textarea class="form-control"></textarea></div>
            <button type="button" class="btn btn-primary">Send Message</button>
        </form>
        <p style="margin-top: 3rem;">You can also reach us directly via email at: <strong>support@multitoolshub.com</strong></p>
    </main>
    <footer class="container footer-bottom"><p>&copy; 2026 MultiTools Hub. All rights reserved.</p></footer>
</body>
</html>
